<main class="cv-sections">
  <section class="cv-jobs">
    <h2><i class="fas fa-briefcase"></i>Experience</h2>
    {{ range .Site.Data.content.experience }}
      <div class="cv-jobs-item">
        <div class="cv-jobs-item--name">{{ .role }} — {{ .company }}</div>
        <div class="cv-jobs-item--period">{{ .period }}</div>
        <div class="cv-jobs-item--description">{{ .details | safeHTML }}</div>
      </div>
    {{ end }}
  </section>

  <section class="cv-education">
    <h2><i class="fas fa-graduation-cap"></i>Education</h2>
    {{ range .Site.Data.content.en.education }}
      <div class="cv-education-item">
        <div class="cv-education-item--name">{{ .degree }}</div>
        <div class="cv-education-item--period">{{ .years }}</div>
        <div class="cv-education-item--description">{{ .school }}</div>
      </div>
      
    {{ end }}
  </section>

</main>
