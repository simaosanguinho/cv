<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    {{ $style := resources.Get "main.scss" | css.Sass | resources.Minify
    }}
    <link rel="stylesheet" href="{{ $style.Permalink }}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Optional toolbar for theme toggle or export -->
    <div class="toolbar">
      <!-- <button onclick="document.documentElement.classList.toggle('dark')">Toggle Dark/Light</button> -->
      <button
        class="theme-toggle"
        onclick="document.documentElement.classList.toggle('dark')"
      >
        <span class="hide-dark">
          <i class="fa-solid fa-sun"></i>
        </span>
        <span class="hide-light">
          <i class="fa-solid fa-moon"></i>
        </span>
      </button>
      <a href="#" onclick="window.print()">
        <i class="fa-solid fa-print"></i>
      </a>
    </div>

    <div class="cv">
      {{ partial "header.html" . }}
      <div class="cv-body">
         {{ partial "main_content.html" . }}{{ partial "sidebar.html" . }}
      </div>
    </div>
  </body>
</html>
